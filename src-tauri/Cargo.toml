[package]
name = "free-svn"
version = "0.1.0"
description = "Free-SVN - 跨平台 SVN 图形化工具"
authors = ["lowcode-server"]
license = "MIT"
repository = "https://github.com/lowcode-server/Free-SVN"
edition = "2021"
rust-version = "1.77.2"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
name = "free_svn_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2.6.3", features = [] }

[dependencies]
serde_json = "1.0"
serde = { version = "1.0", features = ["derive"] }
log = "0.4"
tauri = { version = "2.11.3", features = [] }
tauri-plugin-log = "2"
tauri-plugin-store = "2.4.3"
